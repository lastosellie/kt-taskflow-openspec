<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TaskFlow — 팀 떠나기</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<!-- 배경: 멤버 화면 -->
<body class="bg-slate-100 min-h-screen flex flex-col">

  <!-- 헤더 (배경) -->
  <header class="bg-white border-b border-slate-200 px-4 py-3 flex items-center justify-between shrink-0 blur-sm">
    <div class="flex items-center gap-3">
      <div class="w-7 h-7 bg-cyan-600 rounded-md flex items-center justify-center">
        <svg class="w-4 h-4 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2
               M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2" />
        </svg>
      </div>
      <span class="font-bold text-slate-800 text-sm">Alpha 팀 — 멤버</span>
    </div>
  </header>

  <!-- 배경 멤버 화면 (흐림) -->
  <div class="flex-1 max-w-lg mx-auto w-full px-4 py-6 space-y-4 blur-sm pointer-events-none select-none">
    <div class="bg-white rounded-2xl border border-slate-200 shadow-sm p-4">
      <span class="text-xs font-semibold text-slate-500">초대코드</span>
      <p class="text-2xl font-bold tracking-widest text-slate-800 font-mono mt-1">ALPH-4829</p>
    </div>
    <div class="bg-white rounded-2xl border border-slate-200 shadow-sm overflow-hidden">
      <div class="px-4 py-3 border-b border-slate-100">
        <span class="text-sm font-semibold text-slate-700">팀원 3명</span>
      </div>
      <div class="px-4 py-3 flex items-center gap-3">
        <div class="w-9 h-9 rounded-full bg-cyan-100 flex items-center justify-center text-cyan-700 text-sm font-bold">U</div>
        <span class="text-sm text-slate-800">user@example.com</span>
      </div>
    </div>
  </div>

  <!-- 두 가지 상태 토글 버튼 (데모용) -->
  <div class="fixed top-20 left-1/2 -translate-x-1/2 z-40 flex gap-2 bg-white border border-slate-200 rounded-full px-3 py-1.5 shadow-sm">
    <button onclick="showState('owner')"
      class="px-3 py-1 text-xs rounded-full transition-colors" id="btn-owner">
      Owner 상태
    </button>
    <button onclick="showState('member')"
      class="px-3 py-1 text-xs rounded-full transition-colors" id="btn-member">
      멤버 상태
    </button>
  </div>

  <!-- 모달: Owner 차단 -->
  <div id="modal-owner" class="fixed inset-0 bg-black/40 flex items-center justify-center z-50">
    <div class="bg-white rounded-2xl shadow-xl w-80 p-5 space-y-4">
      <div class="text-center">
        <div class="w-12 h-12 bg-amber-100 rounded-full flex items-center justify-center mx-auto mb-3">
          <svg class="w-6 h-6 text-amber-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M12 9v2m0 4h.01M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/>
          </svg>
        </div>
        <h3 class="font-semibold text-slate-800">팀을 떠날 수 없습니다</h3>
        <p class="text-xs text-slate-500 mt-2 leading-relaxed">
          팀 <strong>Owner</strong>는 팀을 떠날 수 없습니다.<br>
          팀을 삭제하거나 다른 멤버에게<br>소유권을 이전하세요.
        </p>
      </div>
      <div class="bg-amber-50 border border-amber-200 rounded-xl px-3 py-2.5">
        <p class="text-xs text-amber-700 text-center font-medium">
          403 OWNER_CANNOT_LEAVE
        </p>
      </div>
      <button onclick="closeAll()"
        class="w-full py-2.5 text-sm text-slate-600 border border-slate-300
               rounded-xl hover:bg-slate-50 transition-colors">
        확인
      </button>
    </div>
  </div>

  <!-- 모달: 일반 멤버 확인 (숨김) -->
  <div id="modal-member" class="hidden fixed inset-0 bg-black/40 flex items-center justify-center z-50">
    <div class="bg-white rounded-2xl shadow-xl w-80 p-5 space-y-4">
      <div class="text-center">
        <div class="w-12 h-12 bg-red-100 rounded-full flex items-center justify-center mx-auto mb-3">
          <svg class="w-6 h-6 text-red-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/>
          </svg>
        </div>
        <h3 class="font-semibold text-slate-800">팀을 떠나시겠습니까?</h3>
        <p class="text-xs text-slate-500 mt-2 leading-relaxed">
          <strong>Alpha 팀</strong>을 떠나면<br>
          칸반과 채팅에 더 이상 접근할 수 없습니다.<br>
          다른 팀의 초대코드로 다시 합류할 수 있습니다.
        </p>
      </div>
      <div class="flex gap-2">
        <button onclick="closeAll()"
          class="flex-1 py-2.5 text-sm text-slate-600 border border-slate-300
                 rounded-xl hover:bg-slate-50 transition-colors">
          취소
        </button>
        <button onclick="leaveTeam()"
          class="flex-1 py-2.5 text-sm text-white bg-red-500 hover:bg-red-600
                 rounded-xl transition-colors font-semibold">
          떠나기
        </button>
      </div>
    </div>
  </div>

  <script>
    function showState(state) {
      document.getElementById('modal-owner').classList.toggle('hidden', state !== 'owner');
      document.getElementById('modal-member').classList.toggle('hidden', state !== 'member');

      ['owner', 'member'].forEach(s => {
        const btn = document.getElementById('btn-' + s);
        if (s === state) {
          btn.className = 'px-3 py-1 text-xs rounded-full bg-slate-800 text-white transition-colors';
        } else {
          btn.className = 'px-3 py-1 text-xs rounded-full text-slate-500 hover:bg-slate-100 transition-colors';
        }
      });
    }

    function closeAll() {
      window.location.href = 'members.html';
    }

    function leaveTeam() {
      // DELETE /teams/{id}/leave → 200 → users.team_id = null → redirect /teams
      window.location.href = 'teams.html';
    }

    showState('owner');
  </script>
</body>
</html>
