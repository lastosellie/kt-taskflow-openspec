<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TaskFlow — 채팅</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100 h-screen flex flex-col">

  <!-- 헤더 -->
  <header class="bg-white border-b border-slate-200 px-4 py-3 flex items-center justify-between shrink-0">
    <div class="flex items-center gap-3">
      <div class="w-7 h-7 bg-cyan-600 rounded-md flex items-center justify-center">
        <svg class="w-4 h-4 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2
               M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2" />
        </svg>
      </div>
      <div>
        <span class="font-bold text-slate-800 text-sm">Alpha 팀</span>
        <span class="text-xs text-slate-400 ml-2">채팅</span>
      </div>
    </div>
    <div class="flex items-center gap-2">
      <a href="kanban.html"
         class="flex items-center gap-1.5 px-3 py-1.5 text-xs font-medium text-slate-600
                hover:bg-slate-100 rounded-lg transition-colors">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M9 17V7m0 10a2 2 0 01-2 2H5a2 2 0 01-2-2V7a2 2 0 012-2h2a2 2 0 012 2m0 10a2 2 0 002 2h2a2 2 0 002-2M9 7a2 2 0 012-2h2a2 2 0 012 2m0 10V7m0 10a2 2 0 002 2h2a2 2 0 002-2V7a2 2 0 00-2-2h-2a2 2 0 00-2 2"/>
        </svg>
        칸반
      </a>
      <!-- 폴링 상태 표시 -->
      <div class="flex items-center gap-1.5 text-xs text-slate-400" id="poll-indicator">
        <span class="w-1.5 h-1.5 rounded-full bg-emerald-400 animate-pulse"></span>
        실시간
      </div>
      <span class="text-xs text-slate-400">user@example.com</span>
      <button class="text-xs text-slate-400 hover:text-slate-600">로그아웃</button>
    </div>
  </header>

  <!-- 메시지 리스트 -->
  <div class="flex-1 overflow-y-auto px-4 py-4 space-y-3" id="message-list">

    <!-- 날짜 구분선 -->
    <div class="flex items-center gap-3 my-2">
      <div class="flex-1 h-px bg-slate-200"></div>
      <span class="text-xs text-slate-400 shrink-0">2024년 1월 15일</span>
      <div class="flex-1 h-px bg-slate-200"></div>
    </div>

    <!-- 타인 메시지 -->
    <div class="flex items-start gap-2.5 message-item">
      <div class="w-7 h-7 rounded-full bg-orange-200 flex items-center justify-center
                  text-orange-700 text-xs font-bold shrink-0 mt-0.5">A</div>
      <div class="max-w-xs">
        <div class="flex items-baseline gap-2 mb-1">
          <span class="text-xs font-semibold text-slate-700">user2@example.com</span>
          <span class="text-xs text-slate-400">09:30</span>
        </div>
        <div class="bg-white rounded-2xl rounded-tl-sm px-3.5 py-2.5 shadow-sm
                    border border-slate-100 text-sm text-slate-800">
          API 설계 먼저 끝내고 DB 작업 시작할게요
        </div>
      </div>
    </div>

    <!-- 내 메시지 -->
    <div class="flex items-start gap-2.5 flex-row-reverse message-item">
      <div class="w-7 h-7 rounded-full bg-cyan-200 flex items-center justify-center
                  text-cyan-700 text-xs font-bold shrink-0 mt-0.5">U</div>
      <div class="max-w-xs">
        <div class="flex items-baseline gap-2 mb-1 flex-row-reverse">
          <span class="text-xs font-semibold text-slate-700">user@example.com</span>
          <span class="text-xs text-slate-400">09:32</span>
        </div>
        <div class="bg-cyan-600 rounded-2xl rounded-tr-sm px-3.5 py-2.5 shadow-sm
                    text-sm text-white">
          네, 칸반에 태스크 추가해놨어요
        </div>
      </div>
    </div>

    <!-- 타인 메시지 -->
    <div class="flex items-start gap-2.5 message-item">
      <div class="w-7 h-7 rounded-full bg-orange-200 flex items-center justify-center
                  text-orange-700 text-xs font-bold shrink-0 mt-0.5">A</div>
      <div class="max-w-xs">
        <div class="flex items-baseline gap-2 mb-1">
          <span class="text-xs font-semibold text-slate-700">user2@example.com</span>
          <span class="text-xs text-slate-400">09:35</span>
        </div>
        <div class="bg-white rounded-2xl rounded-tl-sm px-3.5 py-2.5 shadow-sm
                    border border-slate-100 text-sm text-slate-800">
          확인했습니다! DOING으로 이동할게요
        </div>
      </div>
    </div>

    <!-- 내 메시지 (삭제 가능) -->
    <div class="flex items-start gap-2.5 flex-row-reverse message-item group" id="msg-1">
      <div class="w-7 h-7 rounded-full bg-cyan-200 flex items-center justify-center
                  text-cyan-700 text-xs font-bold shrink-0 mt-0.5">U</div>
      <div class="max-w-xs">
        <div class="flex items-baseline gap-2 mb-1 flex-row-reverse">
          <span class="text-xs font-semibold text-slate-700">user@example.com</span>
          <span class="text-xs text-slate-400">09:40</span>
          <button onclick="deleteMessage('msg-1')"
            class="hidden group-hover:block text-slate-300 hover:text-red-400 transition-colors">
            <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/>
            </svg>
          </button>
        </div>
        <div class="bg-cyan-600 rounded-2xl rounded-tr-sm px-3.5 py-2.5 shadow-sm
                    text-sm text-white">
          👍 좋아요!
        </div>
      </div>
    </div>

  </div>

  <!-- 입력창 -->
  <div class="bg-white border-t border-slate-200 px-4 py-3 shrink-0">
    <div class="flex items-end gap-2">
      <div class="flex-1 relative">
        <textarea id="message-input"
          placeholder="메시지를 입력하세요... (Enter: 전송, Shift+Enter: 줄바꿈)"
          rows="1"
          maxlength="1000"
          class="w-full px-4 py-2.5 text-sm border border-slate-300 rounded-xl
                 focus:outline-none focus:ring-2 focus:ring-cyan-500 focus:border-transparent
                 placeholder:text-slate-400 resize-none overflow-hidden leading-relaxed"
          style="min-height: 42px; max-height: 120px;"></textarea>
        <span class="absolute right-3 bottom-2 text-xs text-slate-300" id="char-count">0/1000</span>
      </div>
      <button id="send-btn"
        class="w-10 h-10 bg-cyan-600 hover:bg-cyan-700 disabled:bg-slate-200
               rounded-xl flex items-center justify-center transition-colors shrink-0"
        onclick="sendMessage()">
        <svg class="w-4 h-4 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"/>
        </svg>
      </button>
    </div>
  </div>

  <script>
    const input = document.getElementById('message-input');
    const charCount = document.getElementById('char-count');

    // 자동 높이 조절
    input.addEventListener('input', () => {
      input.style.height = 'auto';
      input.style.height = Math.min(input.scrollHeight, 120) + 'px';
      charCount.textContent = input.value.length + '/1000';
    });

    // Enter 전송, Shift+Enter 줄바꿈
    input.addEventListener('keydown', e => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });

    function sendMessage() {
      const text = input.value.trim();
      if (!text) return;

      const list = document.getElementById('message-list');
      const now = new Date();
      const time = now.getHours().toString().padStart(2,'0') + ':' + now.getMinutes().toString().padStart(2,'0');
      const id = 'msg-' + Date.now();

      const msgEl = document.createElement('div');
      msgEl.id = id;
      msgEl.className = 'flex items-start gap-2.5 flex-row-reverse message-item group';
      msgEl.innerHTML = `
        <div class="w-7 h-7 rounded-full bg-cyan-200 flex items-center justify-center
                    text-cyan-700 text-xs font-bold shrink-0 mt-0.5">U</div>
        <div class="max-w-xs">
          <div class="flex items-baseline gap-2 mb-1 flex-row-reverse">
            <span class="text-xs font-semibold text-slate-700">user@example.com</span>
            <span class="text-xs text-slate-400">${time}</span>
            <button onclick="deleteMessage('${id}')"
              class="hidden group-hover:block text-slate-300 hover:text-red-400 transition-colors">
              <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                  d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/>
              </svg>
            </button>
          </div>
          <div class="bg-cyan-600 rounded-2xl rounded-tr-sm px-3.5 py-2.5 shadow-sm text-sm text-white">
            ${text.replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>')}
          </div>
        </div>`;

      list.appendChild(msgEl);
      list.scrollTop = list.scrollHeight;

      input.value = '';
      input.style.height = '42px';
      charCount.textContent = '0/1000';
    }

    function deleteMessage(id) {
      const el = document.getElementById(id);
      if (el) el.remove();
    }

    // 5초 폴링 시뮬레이션 (실제 구현 시 GET /teams/{id}/messages?since= 호출)
    let lastSince = new Date().toISOString();
    setInterval(() => {
      // fetch(`/teams/{id}/messages?since=${lastSince}`)
      //   .then(r => r.json()).then(msgs => { msgs.forEach(appendMessage); lastSince = new Date().toISOString(); });
    }, 5000);

    // 초기 스크롤 맨 아래
    window.addEventListener('load', () => {
      const list = document.getElementById('message-list');
      list.scrollTop = list.scrollHeight;
    });
  </script>
</body>
</html>
