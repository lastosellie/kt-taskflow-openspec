<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TaskFlow — 태스크 상세 모달</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    .task-card { cursor: grab; }
    .task-card:active { cursor: grabbing; }
  </style>
</head>
<!-- 칸반 배경 (모달 뒤) -->
<body class="bg-slate-100 min-h-screen flex flex-col">

  <!-- 헤더 -->
  <header class="bg-white border-b border-slate-200 px-4 py-3 flex items-center justify-between shrink-0">
    <div class="flex items-center gap-3">
      <div class="w-7 h-7 bg-cyan-600 rounded-md flex items-center justify-center">
        <svg class="w-4 h-4 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2
               M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2" />
        </svg>
      </div>
      <div>
        <span class="font-bold text-slate-800 text-sm">Alpha 팀</span>
        <span class="text-xs text-slate-400 ml-2">칸반</span>
      </div>
    </div>
    <div class="flex items-center gap-2">
      <span class="text-xs text-slate-400">user@example.com</span>
      <button class="text-xs text-slate-400 hover:text-slate-600">로그아웃</button>
    </div>
  </header>

  <!-- 칸반 배경 (흐림 처리) -->
  <div class="flex gap-4 p-4 flex-1 overflow-x-auto blur-sm pointer-events-none select-none">
    <div class="flex flex-col w-72 shrink-0">
      <div class="flex items-center gap-2 mb-3">
        <span class="w-2.5 h-2.5 rounded-full bg-slate-400"></span>
        <h3 class="text-sm font-semibold text-slate-700">TODO</h3>
        <span class="text-xs bg-slate-200 text-slate-500 px-1.5 py-0.5 rounded-full">2</span>
      </div>
      <div class="space-y-2">
        <div class="task-card bg-white rounded-xl border border-slate-200 p-3.5 shadow-sm">
          <p class="text-sm text-slate-800 font-medium">API 엔드포인트 설계</p>
          <div class="mt-2.5 flex items-center gap-1.5">
            <div class="w-4 h-4 rounded-full bg-orange-200 flex items-center justify-center text-orange-700 text-xs font-bold">A</div>
            <span class="text-xs text-slate-400">user2@example.com</span>
          </div>
        </div>
        <div class="task-card bg-white rounded-xl border border-cyan-300 p-3.5 shadow-md ring-2 ring-cyan-200">
          <p class="text-sm text-slate-800 font-medium">DB 스키마 작성</p>
          <div class="mt-2.5 flex items-center gap-1.5">
            <div class="w-4 h-4 rounded-full bg-cyan-200 flex items-center justify-center text-cyan-700 text-xs font-bold">U</div>
            <span class="text-xs text-slate-400">user@example.com</span>
          </div>
        </div>
      </div>
    </div>
    <div class="flex flex-col w-72 shrink-0">
      <div class="flex items-center gap-2 mb-3">
        <span class="w-2.5 h-2.5 rounded-full bg-orange-400"></span>
        <h3 class="text-sm font-semibold text-slate-700">DOING</h3>
        <span class="text-xs bg-orange-100 text-orange-600 px-1.5 py-0.5 rounded-full">1</span>
      </div>
      <div class="space-y-2">
        <div class="task-card bg-white rounded-xl border border-orange-200 p-3.5 shadow-sm">
          <p class="text-sm text-slate-800 font-medium">FastAPI 인증 구현</p>
          <div class="mt-2.5">
            <span class="text-xs text-slate-400">미할당</span>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- 태스크 상세 모달 (기본 열린 상태) -->
  <div class="fixed inset-0 bg-black/40 flex items-center justify-center z-50">
    <div class="bg-white rounded-2xl shadow-xl w-96 p-5 space-y-4">

      <!-- 헤더 -->
      <div class="flex items-start justify-between">
        <div>
          <span class="text-xs font-medium text-slate-400 uppercase tracking-wide">태스크 상세</span>
        </div>
        <button onclick="closeModal()"
          class="text-slate-400 hover:text-slate-600 transition-colors">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
          </svg>
        </button>
      </div>

      <!-- 제목 입력 -->
      <div>
        <label class="block text-xs font-medium text-slate-600 mb-1">제목</label>
        <input type="text" id="task-title" value="DB 스키마 작성"
          class="w-full px-3 py-2.5 text-sm border border-slate-300 rounded-lg
                 focus:outline-none focus:ring-2 focus:ring-cyan-500 focus:border-transparent" />
      </div>

      <!-- 상태 표시 (읽기 전용, PATCH /tasks/{id}/status로 변경) -->
      <div>
        <label class="block text-xs font-medium text-slate-600 mb-1">상태</label>
        <div class="flex gap-2">
          <span class="px-3 py-1.5 text-xs font-semibold rounded-lg bg-slate-100 text-slate-500 ring-2 ring-slate-300 cursor-default">TODO</span>
          <span class="px-3 py-1.5 text-xs font-semibold rounded-lg bg-slate-50 text-slate-400 cursor-default">DOING</span>
          <span class="px-3 py-1.5 text-xs font-semibold rounded-lg bg-slate-50 text-slate-400 cursor-default">DONE</span>
        </div>
        <p class="text-xs text-slate-400 mt-1">상태는 칸반 드래그로 변경하세요</p>
      </div>

      <!-- 담당자 선택 -->
      <div>
        <label class="block text-xs font-medium text-slate-600 mb-1">담당자</label>
        <select id="task-assignee"
          class="w-full px-3 py-2.5 text-sm border border-slate-300 rounded-lg
                 focus:outline-none focus:ring-2 focus:ring-cyan-500 focus:border-transparent
                 bg-white">
          <option value="">미할당</option>
          <option value="1" selected>user@example.com (나)</option>
          <option value="2">user2@example.com</option>
          <option value="3">user3@example.com</option>
        </select>
      </div>

      <!-- 메타 정보 -->
      <div class="bg-slate-50 rounded-xl px-3 py-2.5 space-y-1">
        <div class="flex items-center justify-between text-xs">
          <span class="text-slate-400">생성자</span>
          <span class="text-slate-600">user@example.com</span>
        </div>
        <div class="flex items-center justify-between text-xs">
          <span class="text-slate-400">생성일</span>
          <span class="text-slate-600">2024.01.15 09:00</span>
        </div>
      </div>

      <!-- 버튼 -->
      <div class="flex gap-2 pt-1">
        <button onclick="closeModal()"
          class="flex-1 py-2.5 text-sm text-slate-600 border border-slate-300
                 rounded-xl hover:bg-slate-50 transition-colors">
          취소
        </button>
        <button onclick="saveTask()"
          class="flex-1 py-2.5 text-sm text-white bg-cyan-600 hover:bg-cyan-700
                 rounded-xl transition-colors font-semibold">
          저장
        </button>
      </div>

    </div>
  </div>

  <script>
    function closeModal() {
      window.location.href = 'kanban.html';
    }
    function saveTask() {
      const title = document.getElementById('task-title').value.trim();
      const assignee = document.getElementById('task-assignee').value;
      if (!title) return;
      // PUT /tasks/{id} { title, assignee_id }
      alert(`저장: "${title}" / 담당자 ID: ${assignee || '없음'}`);
    }
  </script>
</body>
</html>
