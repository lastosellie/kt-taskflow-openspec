<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TaskFlow — 멤버 목록</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100 min-h-screen flex flex-col">

  <!-- 헤더 -->
  <header class="bg-white border-b border-slate-200 px-4 py-3 flex items-center justify-between shrink-0">
    <div class="flex items-center gap-3">
      <div class="w-7 h-7 bg-cyan-600 rounded-md flex items-center justify-center">
        <svg class="w-4 h-4 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2
               M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2" />
        </svg>
      </div>
      <div>
        <span class="font-bold text-slate-800 text-sm">Alpha 팀</span>
        <span class="text-xs text-slate-400 ml-2">멤버</span>
      </div>
    </div>
    <div class="flex items-center gap-2">
      <a href="kanban.html"
         class="flex items-center gap-1.5 px-3 py-1.5 text-xs font-medium text-slate-600
                hover:bg-slate-100 rounded-lg transition-colors">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M9 17V7m0 10a2 2 0 01-2 2H5a2 2 0 01-2-2V7a2 2 0 012-2h2a2 2 0 012 2m0 10a2 2 0 002 2h2a2 2 0 002-2M9 7a2 2 0 012-2h2a2 2 0 012 2m0 10V7m0 10a2 2 0 002 2h2a2 2 0 002-2V7a2 2 0 00-2-2h-2a2 2 0 00-2 2"/>
        </svg>
        칸반
      </a>
      <a href="chat.html"
         class="flex items-center gap-1.5 px-3 py-1.5 text-xs font-medium text-slate-600
                hover:bg-slate-100 rounded-lg transition-colors">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8
               a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12
               c0-4.418 4.03-8 9-8s9 3.582 9 8z"/>
        </svg>
        채팅
      </a>
      <span class="text-xs text-slate-400">user@example.com</span>
      <button class="text-xs text-slate-400 hover:text-slate-600">로그아웃</button>
    </div>
  </header>

  <!-- 본문 -->
  <div class="flex-1 max-w-lg mx-auto w-full px-4 py-6 space-y-4">

    <!-- 초대코드 카드 (owner만 표시) -->
    <div class="bg-white rounded-2xl border border-slate-200 shadow-sm p-4">
      <div class="flex items-center justify-between mb-1">
        <span class="text-xs font-semibold text-slate-500 uppercase tracking-wide">초대코드</span>
        <span class="text-xs text-cyan-600 font-medium">Owner</span>
      </div>
      <div class="flex items-center gap-3 mt-2">
        <span class="text-2xl font-bold tracking-widest text-slate-800 font-mono">ALPH-4829</span>
        <button onclick="copyCode()"
          class="px-3 py-1.5 text-xs bg-slate-100 hover:bg-slate-200 text-slate-600
                 rounded-lg transition-colors font-medium">
          복사
        </button>
      </div>
      <p class="text-xs text-slate-400 mt-1">이 코드를 팀원에게 공유하면 합류할 수 있습니다</p>
    </div>

    <!-- 멤버 목록 -->
    <div class="bg-white rounded-2xl border border-slate-200 shadow-sm overflow-hidden">
      <div class="px-4 py-3 border-b border-slate-100 flex items-center justify-between">
        <span class="text-sm font-semibold text-slate-700">팀원</span>
        <span class="text-xs bg-slate-100 text-slate-500 px-2 py-0.5 rounded-full">3명</span>
      </div>

      <!-- 멤버 행: 본인 (owner) -->
      <div class="flex items-center gap-3 px-4 py-3 border-b border-slate-50">
        <div class="w-9 h-9 rounded-full bg-cyan-100 flex items-center justify-center
                    text-cyan-700 text-sm font-bold shrink-0">U</div>
        <div class="flex-1 min-w-0">
          <div class="flex items-center gap-2">
            <span class="text-sm font-medium text-slate-800">user@example.com</span>
            <span class="text-xs bg-cyan-100 text-cyan-700 px-1.5 py-0.5 rounded-full font-medium">Owner</span>
            <span class="text-xs bg-emerald-100 text-emerald-600 px-1.5 py-0.5 rounded-full">나</span>
          </div>
          <span class="text-xs text-slate-400">2024.01.10 합류</span>
        </div>
      </div>

      <!-- 멤버 행 -->
      <div class="flex items-center gap-3 px-4 py-3 border-b border-slate-50">
        <div class="w-9 h-9 rounded-full bg-orange-100 flex items-center justify-center
                    text-orange-700 text-sm font-bold shrink-0">A</div>
        <div class="flex-1 min-w-0">
          <span class="text-sm font-medium text-slate-800 block">user2@example.com</span>
          <span class="text-xs text-slate-400">2024.01.12 합류</span>
        </div>
      </div>

      <!-- 멤버 행 -->
      <div class="flex items-center gap-3 px-4 py-3">
        <div class="w-9 h-9 rounded-full bg-violet-100 flex items-center justify-center
                    text-violet-700 text-sm font-bold shrink-0">B</div>
        <div class="flex-1 min-w-0">
          <span class="text-sm font-medium text-slate-800 block">user3@example.com</span>
          <span class="text-xs text-slate-400">2024.01.15 합류</span>
        </div>
      </div>
    </div>

    <!-- 팀 떠나기 (비-owner만 활성) -->
    <div class="bg-white rounded-2xl border border-slate-200 shadow-sm p-4">
      <button onclick="openLeaveModal()"
        class="w-full py-2.5 text-sm text-red-500 border border-red-200 hover:bg-red-50
               rounded-xl transition-colors font-medium">
        팀 떠나기
      </button>
      <p class="text-xs text-slate-400 text-center mt-2">Owner는 팀을 떠날 수 없습니다</p>
    </div>

  </div>

  <!-- 팀 떠나기 확인 모달 -->
  <div id="leave-modal" class="hidden fixed inset-0 bg-black/40 flex items-center justify-center z-50">
    <div class="bg-white rounded-2xl shadow-xl w-80 p-5 space-y-4">
      <div class="text-center">
        <div class="w-12 h-12 bg-red-100 rounded-full flex items-center justify-center mx-auto mb-3">
          <svg class="w-6 h-6 text-red-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/>
          </svg>
        </div>
        <h3 class="font-semibold text-slate-800">팀을 떠나시겠습니까?</h3>
        <p class="text-xs text-slate-500 mt-1">
          <strong>Alpha 팀</strong>을 떠나면 칸반과 채팅에<br>더 이상 접근할 수 없습니다.
        </p>
      </div>
      <div class="flex gap-2">
        <button onclick="closeLeaveModal()"
          class="flex-1 py-2.5 text-sm text-slate-600 border border-slate-300
                 rounded-xl hover:bg-slate-50 transition-colors">
          취소
        </button>
        <button class="flex-1 py-2.5 text-sm text-white bg-red-500 hover:bg-red-600
                       rounded-xl transition-colors font-semibold">
          떠나기
        </button>
      </div>
    </div>
  </div>

  <script>
    function copyCode() {
      navigator.clipboard.writeText('ALPH-4829');
      const btn = event.target;
      btn.textContent = '복사됨!';
      setTimeout(() => btn.textContent = '복사', 1500);
    }
    function openLeaveModal() {
      document.getElementById('leave-modal').classList.remove('hidden');
    }
    function closeLeaveModal() {
      document.getElementById('leave-modal').classList.add('hidden');
    }
  </script>
</body>
</html>
