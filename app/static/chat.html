<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TaskFlow — 채팅</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100 h-screen flex flex-col">
  <header class="bg-white border-b border-slate-200 px-4 py-3 flex items-center justify-between shrink-0">
    <div class="flex items-center gap-3">
      <div class="w-7 h-7 bg-cyan-600 rounded-md flex items-center justify-center">
        <svg class="w-4 h-4 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2
               M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/>
        </svg>
      </div>
      <div>
        <span id="team-name" class="font-bold text-slate-800 text-sm"></span>
        <span class="text-xs text-slate-400 ml-2">채팅</span>
      </div>
    </div>
    <div class="flex items-center gap-2">
      <a id="kanban-link" href="#" class="flex items-center gap-1 px-3 py-1.5 text-xs font-medium text-slate-600 hover:bg-slate-100 rounded-lg">칸반</a>
      <div class="flex items-center gap-1.5 text-xs text-slate-400" id="poll-indicator">
        <span class="w-1.5 h-1.5 rounded-full bg-emerald-400 animate-pulse"></span>실시간
      </div>
      <span id="user-email" class="text-xs text-slate-400"></span>
      <button onclick="logout()" class="text-xs text-slate-400 hover:text-slate-600">로그아웃</button>
    </div>
  </header>

  <div class="flex-1 overflow-y-auto px-4 py-4 space-y-3" id="message-list"></div>

  <div class="bg-white border-t border-slate-200 px-4 py-3 shrink-0">
    <div class="flex items-end gap-2">
      <div class="flex-1 relative">
        <textarea id="message-input" placeholder="메시지를 입력하세요... (Enter: 전송, Shift+Enter: 줄바꿈)"
          rows="1" maxlength="1000"
          class="w-full px-4 py-2.5 text-sm border border-slate-300 rounded-xl
                 focus:outline-none focus:ring-2 focus:ring-cyan-500 resize-none overflow-hidden leading-relaxed"
          style="min-height:42px;max-height:120px"></textarea>
        <span class="absolute right-3 bottom-2 text-xs text-slate-300" id="char-count">0/1000</span>
      </div>
      <button onclick="sendMessage()"
        class="w-10 h-10 bg-cyan-600 hover:bg-cyan-700 rounded-xl flex items-center justify-center shrink-0">
        <svg class="w-4 h-4 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"/>
        </svg>
      </button>
    </div>
  </div>

  <script type="module">
    import { Auth, api, startPolling } from './api.js';
    Auth.check();

    const params  = new URLSearchParams(location.search);
    const teamId  = params.get('team') || JSON.parse(localStorage.getItem('tf_team')||'{}').id;
    if (!teamId) { location.href = '/static/teams.html'; }

    const me = Auth.user();
    document.getElementById('user-email').textContent = me?.email || '';
    document.getElementById('kanban-link').href = `/static/kanban.html?team=${teamId}`;
    document.getElementById('team-name').textContent = JSON.parse(localStorage.getItem('tf_team')||'{}').name || '';

    const list = document.getElementById('message-list');

    function appendMessage(m) {
      const isMine = m.user_id === me?.id;
      const initials = (m.user_email || '?')[0].toUpperCase();
      const time = new Date(m.created_at).toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit'});
      const div = document.createElement('div');
      div.id = `msg-${m.id}`;
      div.className = `flex items-start gap-2.5 ${isMine ? 'flex-row-reverse' : ''} message-item`;
      const bubble = isMine
        ? `<div class="bg-cyan-600 rounded-2xl rounded-tr-sm px-3.5 py-2.5 shadow-sm text-sm text-white">${escHtml(m.content).replace(/\n/g,'<br>')}</div>`
        : `<div class="bg-white rounded-2xl rounded-tl-sm px-3.5 py-2.5 shadow-sm border border-slate-100 text-sm text-slate-800">${escHtml(m.content).replace(/\n/g,'<br>')}</div>`;
      const deleteBtn = isMine
        ? `<button onclick="deleteMsg(${m.id})" class="hidden group-hover:block text-slate-300 hover:text-red-400"><svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg></button>` : '';
      const headerRow = isMine
        ? `<div class="flex items-baseline gap-2 mb-1 flex-row-reverse">${deleteBtn}<span class="text-xs font-semibold text-slate-700">${escHtml(m.user_email||'')}</span><span class="text-xs text-slate-400">${time}</span></div>`
        : `<div class="flex items-baseline gap-2 mb-1"><span class="text-xs font-semibold text-slate-700">${escHtml(m.user_email||'')}</span><span class="text-xs text-slate-400">${time}</span></div>`;
      div.innerHTML = `
        <div class="w-7 h-7 rounded-full ${isMine ? 'bg-cyan-200 text-cyan-700' : 'bg-orange-200 text-orange-700'} flex items-center justify-center text-xs font-bold shrink-0 mt-0.5">${initials}</div>
        <div class="max-w-xs group">${headerRow}${bubble}</div>`;
      div.className += ' group';
      list.appendChild(div);
      list.scrollTop = list.scrollHeight;
    }

    // 초기 로드
    async function init() {
      const messages = await api(`/teams/${teamId}/messages`);
      messages.forEach(appendMessage);
    }
    init();

    // 5초 폴링
    const stopPolling = startPolling(teamId, (msgs) => msgs.forEach(appendMessage));

    // 입력창
    const input = document.getElementById('message-input');
    const cc = document.getElementById('char-count');
    input.addEventListener('input', () => {
      input.style.height = 'auto';
      input.style.height = Math.min(input.scrollHeight, 120)+'px';
      cc.textContent = input.value.length+'/1000';
    });
    input.addEventListener('keydown', e => { if (e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMessage();} });

    window.sendMessage = async function() {
      const text = input.value.trim();
      if (!text) return;
      await api(`/teams/${teamId}/messages`, { method:'POST', body: JSON.stringify({content: text}) });
      input.value=''; input.style.height='42px'; cc.textContent='0/1000';
      const msgs = await api(`/teams/${teamId}/messages`);
      list.innerHTML='';
      msgs.forEach(appendMessage);
    };

    window.deleteMsg = async function(id) {
      await api(`/messages/${id}`, {method:'DELETE'});
      document.getElementById(`msg-${id}`)?.remove();
    };

    window.logout = () => { Auth.clear(); location.href='/static/login.html'; };
    function escHtml(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
  </script>
</body>
</html>
