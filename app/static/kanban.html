<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TaskFlow — 칸반</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    .task-card { cursor: grab; }
    .task-card:active { cursor: grabbing; }
    .column-drop-target.drag-over { background-color: #e0f2fe; }
  </style>
</head>
<body class="bg-slate-100 min-h-screen flex flex-col">
  <header class="bg-white border-b border-slate-200 px-4 py-3 flex items-center justify-between shrink-0">
    <div class="flex items-center gap-3">
      <div class="w-7 h-7 bg-cyan-600 rounded-md flex items-center justify-center">
        <svg class="w-4 h-4 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2
               M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/>
        </svg>
      </div>
      <div>
        <span id="team-name" class="font-bold text-slate-800 text-sm"></span>
        <span class="text-xs text-slate-400 ml-2">칸반</span>
      </div>
    </div>
    <div class="flex items-center gap-2">
      <!-- 필터 -->
      <select id="filter-select" onchange="applyFilter(this.value)"
        class="text-xs border border-slate-200 rounded-lg px-2 py-1.5 text-slate-600 bg-white">
        <option value="">전체</option>
        <option value="@me">@내 태스크</option>
        <option value="unassigned">미할당</option>
      </select>
      <a id="chat-link" href="#"
        class="flex items-center gap-1 px-3 py-1.5 text-xs font-medium text-slate-600 hover:bg-slate-100 rounded-lg">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"/>
        </svg>
        채팅
      </a>
      <a id="members-link" href="#"
        class="flex items-center gap-1 px-3 py-1.5 text-xs font-medium text-slate-600 hover:bg-slate-100 rounded-lg">
        멤버
      </a>
      <button onclick="logout()" class="text-xs text-slate-400 hover:text-slate-600">로그아웃</button>
    </div>
  </header>

  <!-- 칸반 보드 -->
  <div class="flex gap-4 p-4 flex-1 overflow-x-auto">
    <div class="flex flex-col w-72 shrink-0" id="col-wrapper-TODO">
      <div class="flex items-center justify-between mb-3">
        <div class="flex items-center gap-2">
          <span class="w-2.5 h-2.5 rounded-full bg-slate-400"></span>
          <h3 class="text-sm font-semibold text-slate-700">TODO</h3>
          <span class="text-xs bg-slate-200 text-slate-500 px-1.5 py-0.5 rounded-full count-badge">0</span>
        </div>
        <button onclick="openAddModal('TODO')" class="w-6 h-6 flex items-center justify-center rounded-md hover:bg-slate-200 text-slate-400 text-lg">+</button>
      </div>
      <div class="space-y-2 flex-1 column-drop-target rounded-xl p-1 min-h-32 transition-colors" data-status="TODO" id="col-TODO"></div>
    </div>

    <div class="flex flex-col w-72 shrink-0" id="col-wrapper-DOING">
      <div class="flex items-center justify-between mb-3">
        <div class="flex items-center gap-2">
          <span class="w-2.5 h-2.5 rounded-full bg-orange-400"></span>
          <h3 class="text-sm font-semibold text-slate-700">DOING</h3>
          <span class="text-xs bg-orange-100 text-orange-600 px-1.5 py-0.5 rounded-full count-badge">0</span>
        </div>
        <button onclick="openAddModal('DOING')" class="w-6 h-6 flex items-center justify-center rounded-md hover:bg-slate-200 text-slate-400 text-lg">+</button>
      </div>
      <div class="space-y-2 flex-1 column-drop-target rounded-xl p-1 min-h-32 transition-colors" data-status="DOING" id="col-DOING"></div>
    </div>

    <div class="flex flex-col w-72 shrink-0" id="col-wrapper-DONE">
      <div class="flex items-center justify-between mb-3">
        <div class="flex items-center gap-2">
          <span class="w-2.5 h-2.5 rounded-full bg-emerald-500"></span>
          <h3 class="text-sm font-semibold text-slate-700">DONE</h3>
          <span class="text-xs bg-emerald-100 text-emerald-600 px-1.5 py-0.5 rounded-full count-badge">0</span>
        </div>
        <button onclick="openAddModal('DONE')" class="w-6 h-6 flex items-center justify-center rounded-md hover:bg-slate-200 text-slate-400 text-lg">+</button>
      </div>
      <div class="space-y-2 flex-1 column-drop-target rounded-xl p-1 min-h-32 transition-colors" data-status="DONE" id="col-DONE"></div>
    </div>
  </div>

  <!-- 태스크 추가 모달 -->
  <div id="add-modal" class="hidden fixed inset-0 bg-black/40 flex items-center justify-center z-50">
    <div class="bg-white rounded-2xl shadow-xl w-80 p-5 space-y-4">
      <div class="flex items-center justify-between">
        <h3 class="font-semibold text-slate-800 text-sm">태스크 추가</h3>
        <button onclick="closeAddModal()" class="text-slate-400 hover:text-slate-600">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
          </svg>
        </button>
      </div>
      <input id="new-task-title" type="text" placeholder="태스크 제목"
        class="w-full px-3 py-2.5 text-sm border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-cyan-500" />
      <div class="flex gap-2">
        <button onclick="closeAddModal()" class="flex-1 py-2 text-sm text-slate-600 border border-slate-300 rounded-lg">취소</button>
        <button onclick="addTask()" class="flex-1 py-2 text-sm text-white bg-cyan-600 hover:bg-cyan-700 rounded-lg font-semibold">추가</button>
      </div>
    </div>
  </div>

  <script type="module">
    import { Auth, api } from './api.js';
    Auth.check();

    const params = new URLSearchParams(location.search);
    const teamId = params.get('team') || JSON.parse(localStorage.getItem('tf_team') || '{}').id;
    if (!teamId) { location.href = '/static/teams.html'; }

    document.getElementById('chat-link').href = `/static/chat.html?team=${teamId}`;
    document.getElementById('members-link').href = `/static/members.html?team=${teamId}`;

    const teamData = JSON.parse(localStorage.getItem('tf_team') || '{}');
    document.getElementById('team-name').textContent = teamData.name || '';

    let draggedId = null;
    let currentAddStatus = 'TODO';

    async function loadTasks(filter = '') {
      const url = filter ? `/teams/${teamId}/tasks?filter=${encodeURIComponent(filter)}` : `/teams/${teamId}/tasks`;
      const tasks = await api(url);
      ['TODO','DOING','DONE'].forEach(s => { document.getElementById(`col-${s}`).innerHTML = ''; });
      tasks.forEach(renderTask);
      updateCounts();
    }

    function renderTask(t) {
      const col = document.getElementById(`col-${t.status}`);
      const card = document.createElement('div');
      card.className = 'task-card bg-white rounded-xl border border-slate-200 p-3.5 shadow-sm hover:shadow-md transition-all';
      card.draggable = true;
      card.dataset.id = t.id;
      const done = t.status === 'DONE';
      card.innerHTML = `
        <p class="text-sm text-slate-800 font-medium leading-snug ${done ? 'line-through opacity-60' : ''}">${escHtml(t.title)}</p>
        <div class="mt-2.5 flex items-center justify-between">
          <span class="text-xs text-slate-400">${t.assignee_id ? '담당자 #'+t.assignee_id : '미할당'}</span>
          <button class="text-slate-300 hover:text-red-400 transition-colors" onclick="deleteTask(${t.id})">
            <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/>
            </svg>
          </button>
        </div>`;
      card.addEventListener('dragstart', () => { draggedId = t.id; setTimeout(()=>card.classList.add('opacity-50'),0); });
      card.addEventListener('dragend', () => { card.classList.remove('opacity-50'); draggedId = null; });
      col.appendChild(card);
    }

    function updateCounts() {
      ['TODO','DOING','DONE'].forEach(s => {
        const n = document.getElementById(`col-${s}`).children.length;
        document.querySelector(`#col-wrapper-${s} .count-badge`).textContent = n;
      });
    }

    document.querySelectorAll('.column-drop-target').forEach(col => {
      col.addEventListener('dragover', e => { e.preventDefault(); col.classList.add('drag-over'); });
      col.addEventListener('dragleave', () => col.classList.remove('drag-over'));
      col.addEventListener('drop', async e => {
        e.preventDefault(); col.classList.remove('drag-over');
        if (!draggedId) return;
        const newStatus = col.dataset.status;
        await api(`/tasks/${draggedId}/status`, { method:'PATCH', body: JSON.stringify({status: newStatus}) });
        loadTasks(document.getElementById('filter-select').value);
      });
    });

    window.applyFilter = (v) => loadTasks(v);
    window.logout = () => { Auth.clear(); location.href = '/static/login.html'; };

    window.openAddModal = (status) => { currentAddStatus = status; document.getElementById('add-modal').classList.remove('hidden'); document.getElementById('new-task-title').focus(); };
    window.closeAddModal = () => { document.getElementById('add-modal').classList.add('hidden'); document.getElementById('new-task-title').value=''; };
    window.addTask = async () => {
      const title = document.getElementById('new-task-title').value.trim();
      if (!title) return;
      await api(`/teams/${teamId}/tasks`, { method:'POST', body: JSON.stringify({title, status: currentAddStatus}) });
      closeAddModal();
      loadTasks(document.getElementById('filter-select').value);
    };
    window.deleteTask = async (id) => {
      if (!confirm('태스크를 삭제할까요?')) return;
      await api(`/tasks/${id}`, {method:'DELETE'});
      loadTasks(document.getElementById('filter-select').value);
    };

    function escHtml(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

    loadTasks();
  </script>
</body>
</html>
